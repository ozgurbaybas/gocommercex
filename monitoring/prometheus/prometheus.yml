global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: gocommercex
    environment: local

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: gateway-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - gateway:8080

  - job_name: customer-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - customer:8081

  - job_name: product-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - product:8082

  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - order:8083

  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - payment:8084

  - job_name: notification-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - notification:8085