version: "3.9"

name: gocommercex

networks:
  gocommercex-net:
    driver: bridge

volumes:
  customer-postgres-data:
  product-postgres-data:
  order-postgres-data:
  payment-postgres-data:
  notification-postgres-data:
  zookeeper-data:
  kafka-data:
  consul-data:
  vault-data:


services:
  customer-postgres:
    image: postgres:16-alpine
    container_name: gocommercex-customer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: customer_db
      POSTGRES_USER: customer_user
      POSTGRES_PASSWORD: customer_password
    ports:
      - "5433:5432"
    volumes:
      - customer-postgres-data:/var/lib/postgresql/data
    networks:
      - gocommercex-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U customer_user -d customer_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  product-postgres:
    image: postgres:16-alpine
    container_name: gocommercex-product-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: product_password
    ports:
      - "5434:5432"
    volumes:
      - product-postgres-data:/var/lib/postgresql/data
    networks:
      - gocommercex-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U product_user -d product_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  order-postgres:
    image: postgres:16-alpine
    container_name: gocommercex-order-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: order_user
      POSTGRES_PASSWORD: order_password
    ports:
      - "5435:5432"
    volumes:
      - order-postgres-data:/var/lib/postgresql/data
    networks:
      - gocommercex-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U order_user -d order_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  payment-postgres:
    image: postgres:16-alpine
    container_name: gocommercex-payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: payment_user
      POSTGRES_PASSWORD: payment_password
    ports:
      - "5436:5432"
    volumes:
      - payment-postgres-data:/var/lib/postgresql/data
    networks:
      - gocommercex-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U payment_user -d payment_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  notification-postgres:
    image: postgres:16-alpine
    container_name: gocommercex-notification-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: notification_user
      POSTGRES_PASSWORD: notification_password
    ports:
      - "5437:5432"
    volumes:
      - notification-postgres-data:/var/lib/postgresql/data
    networks:
      - gocommercex-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U notification_user -d notification_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: gocommercex-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - gocommercex-net

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: gocommercex-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_started
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - gocommercex-net
    healthcheck:
      test: [ "CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20" ]
      interval: 15s
      timeout: 10s
      retries: 10

  consul:
    image: hashicorp/consul:1.19
    container_name: gocommercex-consul
    restart: unless-stopped
    command: >
      agent -server -bootstrap-expect=1 -ui -client=0.0.0.0
    ports:
      - "8500:8500"
      - "8600:8600/tcp"
      - "8600:8600/udp"
    volumes:
      - consul-data:/consul/data
    networks:
      - gocommercex-net
    healthcheck:
      test: [ "CMD", "consul", "members" ]
      interval: 15s
      timeout: 5s
      retries: 10

  vault:
    image: hashicorp/vault:1.17
    container_name: gocommercex-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    command: vault server -dev
    ports:
      - "8200:8200"
    volumes:
      - vault-data:/vault/file
    networks:
      - gocommercex-net
    healthcheck:
      test: [ "CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status" ]
      interval: 15s
      timeout: 5s
      retries: 10

  zipkin:
    image: openzipkin/zipkin:3.1
    container_name: gocommercex-zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - gocommercex-net
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://127.0.0.1:9411/health" ]
      interval: 15s
      timeout: 5s
      retries: 10
